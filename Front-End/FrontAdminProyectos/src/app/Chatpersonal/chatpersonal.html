<div class="chat-floating-window">
  
  <!-- ENCABEZADO -->
  <div class="chat-header">
    <div class="chat-header-info">
      <div class="header-avatar">{{ (nombreContacto | slice:0:1) | uppercase }}</div>
      <div>
        <h2>{{ nombreContacto || 'Contacto' }}</h2>
        <span class="estado-conexion" [class.online]="contactoEnLinea">
          {{ contactoEnLinea ? 'En línea' : 'Desconectado' }}
        </span>
      </div>
    </div>
    <button class="btn-cerrar" (click)="emitirCierre()" title="Cerrar chat">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>

  <!-- ÁREA DE MENSAJES -->
  <div class="chat-messages" #scrollContainer>
    <div *ngIf="cargando" class="loading-state">Cargando mensajes...</div>
    
    <div *ngFor="let msg of mensajes" 
         class="message-item" 
         [class.message-own]="msg.id_usuario_remitente === usuarioId">
      
      <div class="message-avatar" *ngIf="msg.id_usuario_remitente !== usuarioId">
        {{ msg.remitente?.nombre?.[0] || 'U' }}
      </div>
      
      <div class="message-body">
        <div class="message-meta" *ngIf="msg.id_usuario_remitente !== usuarioId">
          <span class="message-user">{{ msg.remitente?.nombre || 'Usuario' }}</span>
        </div>
        <p class="message-text">{{ msg.contenido }}</p>
        <span class="message-time">{{ msg.fecha_envio | date:'HH:mm' }}</span>
      </div>
    </div>
  </div>

  <!-- ENTRADA DE TEXTO -->
  <div class="chat-input-area">
    <input 
      type="text" 
      [(ngModel)]="nuevoMensaje" 
      placeholder="Escribe un mensaje..." 
      (keyup.enter)="enviarMensaje()"
      class="chat-input">
    <button (click)="enviarMensaje()" [disabled]="!nuevoMensaje.trim()" class="btn-enviar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
    </button>
  </div>

</div>
