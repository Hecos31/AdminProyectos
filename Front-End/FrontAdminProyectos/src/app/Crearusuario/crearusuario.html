<div class="register-container">
  <div class="register-card">
    <h2>📝 Crear Usuario</h2>
    
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Nombre</label>
        <input type="text" [(ngModel)]="usuario.nombre" name="nombre" required placeholder="Juan">
      </div>

      <div class="form-group">
        <label>Apellido</label>
        <input type="text" [(ngModel)]="usuario.apellido" name="apellido" required placeholder="Pérez">
      </div>

      <div class="form-group">
        <label>Correo Electrónico</label>
        <input type="email" [(ngModel)]="usuario.correo" name="correo" required placeholder="juan@email.com">
      </div>

      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" [(ngModel)]="usuario.password" name="password" required placeholder="Mínimo 6 caracteres" minlength="6">
      </div>

      <div *ngIf="errorMessage" class="error-message">❌ {{ errorMessage }}</div>
      <div *ngIf="successMessage" class="success-message">✅ {{ successMessage }}</div>

      <button type="submit" [disabled]="cargando">
        {{ cargando ? 'Creando...' : 'Crear Usuario' }}
      </button>
    </form>

    <p class="login-link">
      ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a>
    </p>
  </div>
</div>
