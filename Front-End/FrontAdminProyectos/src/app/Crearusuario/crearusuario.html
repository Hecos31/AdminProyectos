<div class="register-container">
  <div class="register-card">
    
    <!-- Cabecera de marca Orbita -->
    <div class="brand-header">
      <div class="logo-mark">O</div>
      <h2>Orbita</h2>
    </div>
    
    <p class="subtitle">Crea tu cuenta para comenzar a colaborar</p>
    
    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
      
      <!-- Agrupación en dos columnas para Nombre y Apellido -->
      <div class="form-row">
        <div class="form-group half-width">
          <label for="nombre">Nombre(s)</label>
          <input 
            type="text" 
            id="nombre" 
            [(ngModel)]="usuario.nombre" 
            name="nombre" 
            required 
            autocomplete="given-name">
        </div>

        <div class="form-group half-width">
          <label for="apellido">Apellidos</label>
          <input 
            type="text" 
            id="apellido" 
            [(ngModel)]="usuario.apellido" 
            name="apellido" 
            required 
            autocomplete="family-name">
        </div>
      </div>

      <div class="form-group">
        <label for="correo">Correo Electrónico</label>
        <input 
          type="email" 
          id="correo" 
          [(ngModel)]="usuario.correo" 
          name="correo" 
          required 
          autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          [(ngModel)]="usuario.password" 
          name="password" 
          required 
          minlength="6" 
          autocomplete="new-password" 
          placeholder="Mínimo 6 caracteres">
      </div>

      <!-- Alertas limpias y sin emojis -->
      <div *ngIf="errorMessage" class="alert error-message">
        {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="alert success-message">
        {{ successMessage }}
      </div>

      <!-- Botón vinculado al estado de validación del formulario -->
      <button type="submit" [disabled]="cargando || registerForm.invalid">
        {{ cargando ? 'Creando cuenta...' : 'Crear Usuario' }}
      </button>
      
    </form>

    <p class="auth-link">
      ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión aquí</a>
    </p>
    
  </div>
</div>
