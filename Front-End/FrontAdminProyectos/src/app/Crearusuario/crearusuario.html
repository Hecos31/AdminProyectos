<div class="register-container">
  <div class="register-card">
    
    <div class="brand-header">
      <div class="logo-mark">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="4"></circle><line x1="21.17" y1="8" x2="12" y2="8"></line><line x1="3.95" y1="6.06" x2="8.54" y2="14"></line><line x1="10.88" y1="21.94" x2="15.46" y2="14"></line></svg>
      </div>
      <h2>Orbita</h2>
    </div>
    
    <p class="subtitle">Crea tu cuenta para comenzar a colaborar</p>
    
    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
      
      <div class="form-row">
        <div class="form-group half-width">
          <label for="nombre">Nombre(s)</label>
          <input 
            type="text" 
            id="nombre" 
            class="k-input"
            [(ngModel)]="usuario.nombre" 
            name="nombre" 
            required 
            autocomplete="given-name">
        </div>

        <div class="form-group half-width">
          <label for="apellido">Apellidos</label>
          <input 
            type="text" 
            id="apellido" 
            class="k-input"
            [(ngModel)]="usuario.apellido" 
            name="apellido" 
            required 
            autocomplete="family-name">
        </div>
      </div>

      <div class="form-group">
        <label for="correo">Correo Electrónico</label>
        <input 
          type="email" 
          id="correo" 
          class="k-input"
          [(ngModel)]="usuario.correo" 
          name="correo" 
          required 
          autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password" 
          class="k-input"
          [(ngModel)]="usuario.password" 
          name="password" 
          required 
          minlength="6" 
          autocomplete="new-password" 
          placeholder="Mínimo 6 caracteres">
      </div>

      <div *ngIf="errorMessage" class="alert error-message">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        {{ errorMessage }}
      </div>
      
      <div *ngIf="successMessage" class="alert success-message">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        {{ successMessage }}
      </div>

      <button type="submit" class="btn-primary" [disabled]="cargando || registerForm.invalid">
        {{ cargando ? 'Creando cuenta...' : 'Crear Usuario' }}
      </button>
      
    </form>

    <p class="auth-link">
      ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión aquí</a>
    </p>
    
  </div>
</div>
