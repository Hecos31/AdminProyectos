<div class="crear-proyecto-container">
  <div class="crear-proyecto-card">
    <h2>🚀 Crear Nuevo Proyecto</h2>
    
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Nombre del Proyecto *</label>
        <input 
          type="text" 
          [(ngModel)]="proyecto.nombre" 
          name="nombre"
          required
          placeholder="Mi Proyecto"
        >
      </div>

      <div class="form-group">
        <label>Descripción</label>
        <textarea 
          [(ngModel)]="proyecto.descripcion" 
          name="descripcion"
          placeholder="Descripción del proyecto"
          rows="3"
        ></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Fecha de Inicio</label>
          <input 
            type="date" 
            [(ngModel)]="proyecto.fecha_inicio" 
            name="fecha_inicio"
          >
        </div>

        <div class="form-group">
          <label>Fecha de Fin</label>
          <input 
            type="date" 
            [(ngModel)]="proyecto.fecha_fin" 
            name="fecha_fin"
          >
        </div>
      </div>

      <div class="form-group">
        <label>Estado</label>
        <select [(ngModel)]="proyecto.estado" name="estado">
          <option value="Activo">Activo</option>
          <option value="Pausado">Pausado</option>
          <option value="Finalizado">Finalizado</option>
        </select>
      </div>

      <div *ngIf="errorMessage" class="error-message">
        ❌ {{ errorMessage }}
      </div>

      <div *ngIf="successMessage" class="success-message">
        ✅ {{ successMessage }}
      </div>

      <div class="form-actions">
        <button type="button" (click)="cancelar()" class="btn-cancelar">
          Cancelar
        </button>
        <button type="submit" [disabled]="cargando" class="btn-crear">
          {{ cargando ? 'Creando...' : 'Crear Proyecto' }}
        </button>
      </div>
    </form>
  </div>
</div>
