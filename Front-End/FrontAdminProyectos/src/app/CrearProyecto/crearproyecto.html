<div class="crear-proyecto-container">
  
  <main class="main-content">
    <div class="header-simple">
      <button (click)="cancelar()" class="btn-volver">
        <i class="fa-solid fa-arrow-left"></i> Volver
      </button>
      <h1>Crear Nuevo Proyecto</h1>
    </div>

    <div class="crear-proyecto-card">
      <div class="card-header">
        <i class="fa-solid fa-folder-plus header-icon"></i>
        <h3>Configuración Inicial</h3>
      </div>
      
      <form (ngSubmit)="onSubmit()" #proyectoForm="ngForm">
        
        <div class="form-group">
          <label for="nombre">Nombre del Proyecto <span class="required">*</span></label>
          <input 
            type="text" 
            id="nombre"
            [(ngModel)]="proyecto.nombre" 
            name="nombre"
            required
            placeholder="Ej. Diseño de Interfaz Orbita"
          >
        </div>

        <div class="form-group">
          <label for="descripcion">Descripción</label>
          <textarea 
            id="descripcion"
            [(ngModel)]="proyecto.descripcion" 
            name="descripcion"
            placeholder="Describe brevemente los objetivos del proyecto..."
            rows="3"
          ></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="fecha_inicio">Fecha de Inicio</label>
            <input 
              type="date" 
              id="fecha_inicio"
              [(ngModel)]="proyecto.fecha_inicio" 
              name="fecha_inicio"
            >
          </div>

          <div class="form-group">
            <label for="fecha_fin">Fecha de Fin</label>
            <input 
              type="date" 
              id="fecha_fin"
              [(ngModel)]="proyecto.fecha_fin" 
              name="fecha_fin"
            >
          </div>
        </div>

        <div class="form-group">
          <label for="estado">Estado Inicial</label>
          <div class="select-wrapper">
            <select id="estado" [(ngModel)]="proyecto.estado" name="estado">
              <option value="Activo">Activo</option>
              <option value="Pausado">Pausado</option>
              <option value="Finalizado">Finalizado</option>
            </select>
          </div>
        </div>

        <div *ngIf="errorMessage" class="alert error-message">
          <i class="fa-solid fa-circle-exclamation"></i> {{ errorMessage }}
        </div>

        <div *ngIf="successMessage" class="alert success-message">
          <i class="fa-solid fa-circle-check"></i> {{ successMessage }}
        </div>

        <div class="form-actions">
          <button type="button" (click)="cancelar()" class="btn-secundario">
            Cancelar
          </button>
          <button type="submit" [disabled]="cargando || proyectoForm.invalid" class="btn-primario">
            {{ cargando ? 'Creando entorno...' : 'Crear Proyecto' }}
          </button>
        </div>
        
      </form>
    </div>
  </main>
</div>
