<div class="configuracion-container">
  <main class="main-content">
    
    <header class="header-actions">
      <button (click)="volverAlProyecto()" class="btn-volver">
        ← Volver al Proyecto
      </button>
    </header>

    <div class="gestion-integrantes">
      <div class="card-header">
        <h3>Colaboradores del Proyecto</h3>
      </div>
      
      <div class="agregar-integrante">
        <input type="email" [(ngModel)]="nuevoColaborador.correo" placeholder="Email del colaborador" class="input-email">
        <select [(ngModel)]="nuevoColaborador.rol" class="select-rol">
          <option value="admin">Administrador</option>
          <option value="editor">Editor</option>
          <option value="colaborador">Colaborador</option>
        </select>
        <button (click)="agregarColaborador()" class="btn-agregar">Agregar</button>
      </div>

      <div *ngIf="successMessage" class="alert success-message">{{ successMessage }}</div>
      <div *ngIf="errorMessage" class="alert error-message">{{ errorMessage }}</div>

      <div *ngIf="cargando" class="loading-state">Cargando colaboradores...</div>

      <div *ngIf="!cargando" class="lista-integrantes">
        <div *ngFor="let colaborador of colaboradores" class="integrante-item">
          <div class="integrante-info">
            <div class="detalles">
              <div class="nombre">{{ colaborador.nombre || colaborador.correo }}</div>
              <div class="email">{{ colaborador.correo }}</div>
            </div>
          </div>
          
          <div class="integrante-controls">
            <select 
              [value]="colaborador.rol_nombre || 'colaborador'" 
              (change)="cambiarRol(colaborador.id_usuario, $any($event.target).value)" 
              class="select-rol-mini"
            >
              <option value="admin">Administrador</option>
              <option value="editor">Editor</option>
              <option value="colaborador">Colaborador</option>
            </select>
            
            <button (click)="eliminarColaborador(colaborador.id_usuario)" class="btn-eliminar">
              Eliminar
            </button>
          </div>
        </div>

        <div *ngIf="colaboradores.length === 0" class="sin-integrantes">
          No hay colaboradores en este proyecto
        </div>
      </div>
    </div>
  </main>
</div>
