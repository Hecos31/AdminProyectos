<div class="chat-main-container">
  
  <!-- PANEL LATERAL: LISTA DE CHATS -->
  <div class="chat-sidebar">
    <app-chat-list (abrirChat)="onAbrirChat($event)"></app-chat-list>
  </div>

  <!-- PANEL PRINCIPAL: ÁREA DE MENSAJES -->
  <div class="chat-content">
    
    <!-- Estado Activo: Se muestra si hay un chat seleccionado -->
    <div *ngIf="chatSeleccionado" class="chat-content-wrapper fade-in">
      <app-chat-personal 
        [idConversacion]="chatSeleccionado.id"
        [nombreContacto]="chatSeleccionado.nombre">
      </app-chat-personal>
    </div>

    <!-- Estado Vacío: Se muestra al iniciar -->
    <div *ngIf="!chatSeleccionado" class="chat-empty-state fade-in">
      <div class="empty-state-content">
        <div class="empty-avatar">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
        </div>
        <h3>Tus conversaciones</h3>
        <p>Selecciona un chat del panel lateral para comenzar a enviar mensajes.</p>
      </div>
    </div>
    
  </div>
</div>
