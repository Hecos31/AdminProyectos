<div class="chat-main-container">
  <div class="chat-sidebar">
    <app-chat-list (abrirChat)="onAbrirChat($event)"></app-chat-list>
  </div>

  <div class="chat-content">
    <div *ngIf="chatSeleccionado" class="chat-content-wrapper">
      <app-chat-personal 
        [idConversacion]="chatSeleccionado.id"
        [nombreContacto]="chatSeleccionado.nombre">
      </app-chat-personal>
    </div>

    <div *ngIf="!chatSeleccionado" class="chat-empty-state">
      <div class="empty-state-content">
        <div class="empty-icon"></div>
        <h3>Selecciona una conversacion</h3>
        <p>Elige un chat de la lista para comenzar a enviar mensajes</p>
      </div>
    </div>
  </div>
</div>
