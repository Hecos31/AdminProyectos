<div class="login-container">
  <div class="login-card">
    
    <div class="brand-header">
      <div class="logo-mark">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="4"></circle><line x1="21.17" y1="8" x2="12" y2="8"></line><line x1="3.95" y1="6.06" x2="8.54" y2="14"></line><line x1="10.88" y1="21.94" x2="15.46" y2="14"></line></svg>
      </div>
      <h2>Orbita</h2>
    </div>
    
    <p class="subtitle">Inicia sesión para continuar a tu espacio de trabajo</p>
    
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      
      <div class="form-group">
        <label for="correo">Correo Electrónico</label>
        <input 
          type="email" 
          id="correo"
          class="k-input"
          [(ngModel)]="credentials.correo" 
          name="correo" 
          required 
          autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password"
          class="k-input"
          [(ngModel)]="credentials.password" 
          name="password" 
          required 
          autocomplete="current-password"
          placeholder="Ingresa tu contraseña">
      </div>

      <div *ngIf="errorMessage" class="alert error-message">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-primary" [disabled]="cargando || loginForm.invalid">
        {{ cargando ? 'Iniciando sesión...' : 'Ingresar' }}
      </button>
      
    </form>

    <p class="auth-link">
      ¿No tienes una cuenta? <a routerLink="/registro">Regístrate aquí</a>
    </p>
    
  </div>
</div>
