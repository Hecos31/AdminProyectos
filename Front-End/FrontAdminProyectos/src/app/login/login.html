<div class="login-container">
  <div class="login-card">
    
    <div class="brand-header">
      <div class="logo-mark">O</div>
      <h2>Orbita</h2>
    </div>
    
    <p class="subtitle">Inicia sesión para continuar a tu espacio de trabajo</p>
    
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      
      <div class="form-group">
        <label for="correo">Correo Electrónico</label>
        <input 
          type="email" 
          id="correo"
          [(ngModel)]="credentials.correo" 
          name="correo" 
          required 
          autocomplete="email"
          placeholder="nombre@empresa.com">
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input 
          type="password" 
          id="password"
          [(ngModel)]="credentials.password" 
          name="password" 
          required 
          autocomplete="current-password"
          placeholder="Ingresa tu contraseña">
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="cargando || loginForm.invalid">
        {{ cargando ? 'Iniciando sesión...' : 'Ingresar' }}
      </button>
      
    </form>

    <p class="register-link">
      ¿No tienes una cuenta? <a routerLink="/registro">Regístrate aquí</a>
    </p>
    
  </div>
</div>
