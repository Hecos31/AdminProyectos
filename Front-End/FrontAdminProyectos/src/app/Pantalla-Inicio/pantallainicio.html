<div class="inicio-container">

  <main class="main-content">
    <header class="header">
      <h1>🚀 Mis Proyectos</h1>
      <div class="user-info">
        <span>👋 {{ usuario?.nombre || 'Usuario' }}</span>
        <button (click)="cerrarSesion()" class="btn-logout">Cerrar Sesión</button>
      </div>
    </header>

    <div *ngIf="cargando" class="loading">Cargando proyectos...</div>

    <div *ngIf="!cargando" class="proyectos-grid">
      <div *ngFor="let proyecto of proyectos" class="proyecto-card" (click)="irAProyecto(proyecto.id_proyecto)">
        <div class="proyecto-icono">📁</div>
        <div class="proyecto-info">
          <h3>{{ proyecto.nombre }}</h3>
          <p>{{ proyecto.descripcion || 'Sin descripción' }}</p>
          <div class="proyecto-meta">
            <span>📅 {{ proyecto.fecha_creacion | date:'dd/MM/yyyy' }}</span>
            <span>📌 {{ proyecto.estado || 'Activo' }}</span>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
