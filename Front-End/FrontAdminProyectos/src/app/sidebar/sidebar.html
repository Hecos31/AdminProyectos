<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <span class="logo-icon">🚀</span>
      <span class="logo-text">AdminProyectos</span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <ul class="nav-list">
      <li class="nav-item">
        <a routerLink="/inicio" class="nav-link" routerLinkActive="active">
          <span class="nav-icon">🏠</span>
          <span class="nav-text">Inicio</span>
        </a>
      </li>
      <li class="nav-item">
        <button (click)="irAIntegrantes()" class="nav-link">
          <span class="nav-icon">👥</span>
          <span class="nav-text">Integrantes</span>
        </button>
      </li>
      <li class="nav-item">
        <button (click)="irACalendario()" class="nav-link">
          <span class="nav-icon">📅</span>
          <span class="nav-text">Calendario</span>
        </button>
      </li>
      <li class="nav-item">
        <button (click)="irAConfiguracion()" class="nav-link">
          <span class="nav-icon">⚙️</span>
          <span class="nav-text">Configuración</span>
        </button>
      </li>
    </ul>
  </nav>

  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar">👤</div>
      <div class="user-details">
        <div class="user-name">{{ usuario?.nombre || 'Usuario' }}</div>
        <div class="user-email">{{ usuario?.correo || 'usuario@email.com' }}</div>
      </div>
    </div>
    <button (click)="cerrarSesion()" class="btn-logout">🚪</button>
  </div>
</div>
